# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: llm-gateway

---
# ── Secret (base64-encode your values: echo -n 'value' | base64) ─────────────
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: llm-gateway
type: Opaque
data:
  # echo -n 'sk-prod-key1,sk-prod-key2' | base64
  GATEWAY_API_KEYS: c2stcHJvZC1rZXkx      # REPLACE with real base64
  # echo -n 'sk-openai-...' | base64
  LLM_API_KEY: c2stb3BlbmFpLXJlcGxhY2U=  # REPLACE with real base64

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: llm-gateway
data:
  LLM_BASE_URL: "https://api.openai.com/v1"

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: llm-gateway
  labels:
    app: llm-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: gateway
          image: llm-gateway:latest          # replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: gateway-config

          env:
            - name: GATEWAY_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: GATEWAY_API_KEYS
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: LLM_API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          volumeMounts:
            - name: logs
              mountPath: /app/logs

      volumes:
        - name: logs
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway-svc
  namespace: llm-gateway
spec:
  selector:
    app: llm-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---
# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-gateway-hpa
  namespace: llm-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-gateway
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
