name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Silence Node.js 20 deprecation warnings (required before June 16 2026) ──
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v
        env:
          # Provide a test key so auth-dependent tests don't fail at env lookup
          GATEWAY_API_KEYS: "test-key-integration"
          LLM_BASE_URL: "https://api.openai.com/v1"
          LLM_API_KEY: "sk-test-placeholder"

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-gateway:test .